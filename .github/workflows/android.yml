name: Android CI

on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        description: '输入版本号'
        # Default value if no value is explicitly provided
        default: 'manual-latest'
        # Input has to be provided for the workflow to run
        required: true
        # The data type of the input
        type: string

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-app  # 替换成你 gradlew 所在的实际路径
    
    env:
      # 核心逻辑：如果有手动输入则用输入值，否则用 Git 引用名（分支/标签名）
      APK_TAG: ${{ github.event.inputs.name || github.ref_name }}
      APK_NAME: "notes"
      
    steps:
    - uses: actions/checkout@v5
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: 还原签名文件
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      env:
        # 对应 build.gradle 中定义的环境变量名
        SIGNING_STORE_FILE: my-release-key.jks
        SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    - name: 打印 APK 实际路径 (调试用)
      run: find . -name "*.apk"
      
    - name: Upload Tarball
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.APK_NAME }}-${{ env.APK_TAG }}
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error # 如果还是找不到，直接报错而不是只发警告，方便调试
    